summary: |
  This game featured the same devices used for the previous game with one addition:
  a stopper (orange color) below the collar (black color) in addition to the stopper
  above the collar.

  Reason: To reduce time (a few seconds each time) for umpires to set the bails after
  every stumping attempt. It is faster to set the device and bails if the collar falls
  and rests on the stopper than if it falls all the way to the ground.

  Other benefits and drawbacks documented in previous game learnings.

notes: |
