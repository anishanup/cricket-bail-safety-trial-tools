# Trial: GP 1: Virat CC  vs Dallas Cyclones - Qualifier 2 - GPCC Cup 2025
source_url: "https://youtu.be/pgs4ff1pVo0"
highlight_url: "https://youtu.be/wcU3rw3yzTg"
type: live_match
date: "2026-02-01"

summary: |
  Improved materials for the device. 
  1. Silicone stopper (cut from 4 ply 5 mm thick silicone pipe used for automotive purposes). Resists impact and retains shape. Much better than PVC collar.
  2. Stronger thread
  3. No O-rings connecting bail to thread. Instead, bail directly tied to thread. Much higher impact reistance than rubber or silicone O-rings.
     Used the 'Scaffold knot' with additional wraps (4 - for additional grip stength)
     To install on bail, loop the knot's loop twice around the bail knurling and pull to tighten (like a noose). Pull a few more times for extra tightness.
  4. Device functions as expected throughout the game
  5. After a certain stage in the game, umpires also trialed an alternate design where they placed the collar on top of the stopper. 
     This alternate design is documented further in https://zenodo.org/records/18043789 in the Supplemental Techinical FAQ PDF (https://zenodo.org/records/18043789/files/Supplemental-Technical-FAQ-Bail-Mass-and-Collar-Design.pdf?download=1)
     This alternate design is less preferable, but it performed adequately throughout the game.

